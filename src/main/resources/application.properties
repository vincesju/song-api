spring.application.name=student

# ---- DataSource configuration ----
# Defaults to H2 for local dev. Supports Render DATABASE_URL or PG* env vars in production.
spring.datasource.url=${DATABASE_URL:${JDBC_DATABASE_URL:jdbc:h2:mem:songdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${DB_USERNAME:${PGUSER:sa}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- H2 console (local) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Server ----
server.port=${PORT:8080}

# ---- HikariCP Connection Pool ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000