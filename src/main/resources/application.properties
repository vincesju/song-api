spring.application.name=student

# ---- DataSource configuration ----
# Defaults to H2 for local dev. Set DATABASE_URL/DB_DRIVER/JPA_DIALECT to use PostgreSQL.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:songdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect fallback: avoids 'Unable to determine Dialect without JDBC metadata'
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# ---- H2 console (local) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Server ----
server.port=${PORT:8080}

# ---- HikariCP Connection Pool ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000